      .announcement-bar {
        position: fixed;

        flex-wrap: wrap;

        display: inline-block;

        font-size: 0.82rem;
        font-weight: 700;
        padding: 5px 14px;
        border-radius: 20px;
        text-decoration: none;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        transition: background 0.15s, transform 0.15s;
      }

      .announcement-bar .bar-cta:hover {
        background: #ede9fe;
        transform: scale(1.04);
      }

      .topnav {
        top: 44px !important;
      }

      main {
        margin-top: calc(var(--nav-width) + 44px) !important;
      }

      @media (max-width: 600px) {
        .announcement-bar {

          gap: 8px;
        }

        .topnav {
