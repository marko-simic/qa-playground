      name="description"
      content="Create, drag and drop, filter and delete issues on a JIRA-like kanban board and assert their state across columns"

        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;

        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;

        color: #fff;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        padding: 2px 8px;

      }

      @media (max-width: 600px) {
        .announcement-bar {
          font-size: 0.82rem;
          padding: 10px 14px;
          gap: 8px;

    <main role="main">
      <div class="board-header">
        <div class="board-title">
          <h2>QA Project Board</h2>
          <span id="total-count" class="total-count"></span>
        </div>
        <div class="board-controls">
          <select id="filter-assignee" class="filter-select" aria-label="Filter by assignee">
            <option value="">All Assignees</option>
            <option value="Alice">Alice</option>
            <option value="Bob">Bob</option>
            <option value="Carol">Carol</option>
          </select>
          <select id="filter-priority" class="filter-select" aria-label="Filter by priority">
            <option value="">All Priorities</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <button id="create-btn" class="btn-create">+ Create Issue</button>
        </div>
      </div>

      <div class="board" id="board">
        <div class="column" id="col-todo">
          <div class="column-header">
            <span class="column-title">To Do</span>
            <span class="column-count" id="count-todo">0</span>
          </div>
          <div class="column-body" id="body-todo" data-column="todo"></div>
        </div>

        <div class="column" id="col-inprogress">
          <div class="column-header">
            <span class="column-title">In Progress</span>
            <span class="column-count" id="count-inprogress">0</span>
          </div>
          <div class="column-body" id="body-inprogress" data-column="inprogress"></div>
        </div>

        <div class="column" id="col-inreview">
          <div class="column-header">
            <span class="column-title">In Review</span>
            <span class="column-count" id="count-inreview">0</span>
          </div>
          <div class="column-body" id="body-inreview" data-column="inreview"></div>
        </div>

        <div class="column" id="col-done">
          <div class="column-header">
            <span class="column-title">Done</span>
            <span class="column-count" id="count-done">0</span>
          </div>
          <div class="column-body" id="body-done" data-column="done"></div>
        </div>
      </div>
    </main>

    <!-- Create Issue Modal -->
    <div id="create-modal" class="dialog-overlay" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="create-modal-title">
        <div class="modal-header">
          <h3 id="create-modal-title">Create Issue</h3>
          <button class="modal-close" id="create-close" aria-label="Close">&times;</button>
        </div>
        <form id="create-form" novalidate>
          <div class="field">
            <label for="new-title">Title <span class="required">*</span></label>
            <input type="text" id="new-title" placeholder="Issue title" autocomplete="off" />
            <span class="field-error" id="new-title-error" role="alert"></span>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="new-type">Type</label>
              <select id="new-type">
                <option value="task">Task</option>
                <option value="bug">Bug</option>
                <option value="story">Story</option>
              </select>
            </div>
            <div class="field">
              <label for="new-priority">Priority</label>
              <select id="new-priority">
                <option value="medium">Medium</option>
                <option value="low">Low</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="new-assignee">Assignee</label>
            <select id="new-assignee">
              <option value="Unassigned">Unassigned</option>
              <option value="Alice">Alice</option>
              <option value="Bob">Bob</option>
              <option value="Carol">Carol</option>
            </select>
          </div>
          <div class="field">
            <label for="new-desc">Description</label>
            <textarea id="new-desc" rows="3" placeholder="Describe the issue..."></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="create-cancel">Cancel</button>
            <button type="submit" id="create-submit" class="btn-primary">Create</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Issue Detail Modal -->
    <div id="detail-modal" class="dialog-overlay" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="detail-modal-title">
        <div class="modal-header">
          <span id="detail-id" class="issue-key"></span>
          <button class="modal-close" id="detail-close" aria-label="Close">&times;</button>
        </div>
        <div class="detail-badges">
          <span id="detail-type" class="type-badge"></span>
          <span id="detail-priority" class="priority-badge"></span>
        </div>
        <h3 id="detail-modal-title" class="detail-title"></h3>
        <div class="detail-grid">
          <div class="detail-field">
            <span class="detail-label">Status</span>
            <span id="detail-status" class="detail-value"></span>
          </div>
          <div class="detail-field">
            <span class="detail-label">Assignee</span>
            <span id="detail-assignee" class="detail-value"></span>
          </div>
        </div>
        <div class="detail-field">
          <span class="detail-label">Description</span>
          <p id="detail-desc" class="detail-value detail-desc"></p>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="detail-close-btn">Close</button>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="confirm-modal" class="dialog-overlay" hidden>
      <div class="modal confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
        <h3 id="confirm-modal-title" class="confirm-title">Delete Issue?</h3>
        <p id="confirm-message" class="confirm-message"></p>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="confirm-cancel">Cancel</button>
          <button type="button" class="btn-danger" id="confirm-delete">Delete</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
