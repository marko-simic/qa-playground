<!DOCTYPE html>

      .announcement-bar {

        color: #fff;
        text-align: center;
        padding: 10px 20px;
        font-size: 0.88rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
      }

        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: center;
      }

        display: inline-block;
        background: #fff;
        color: #1e1b4b;
        font-size: 0.82rem;
        font-weight: 700;
        padding: 5px 14px;
        border-radius: 20px;
        text-decoration: none;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        transition: background 0.15s, transform 0.15s;
      }

      .announcement-bar .bar-cta:hover {
        background: #ede9fe;
        transform: scale(1.04);
      }

      .topnav {
        top: 44px !important;
      }

      main {
        margin-top: calc(var(--nav-width) + 44px) !important;
      }

      @media (max-width: 600px) {
        .announcement-bar {
          font-size: 0.82rem;
          padding: 10px 14px;
          gap: 8px;
        }

        .topnav {
          top: 64px !important;
        }

        main {
          margin-top: calc(var(--nav-width) + 64px) !important;
        }
      }

      <div class="light-theme wrapper">
        <div class="title">
          <img src="tag.svg" alt="icon" />
          <h2>Tags</h2>
        </div>
        <div class="content">
          <p>Press enter or add a comma after each tag</p>
          <ul>
            <input type="text" spellcheck="false" />

        <div class="details" style="color: black">
          <p><span>10</span> tags are remaining</p>
