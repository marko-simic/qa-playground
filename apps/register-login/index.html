    <main role="main">
      <!-- Register View -->
      <div id="register-view" class="form-card">
        <div class="form-card-header">
          <h2>Create Account</h2>
          <p>Join QA Playground today</p>
        </div>
        <div id="register-alert" class="form-alert" role="alert"></div>
        <form id="register-form" novalidate>
          <div class="field">
            <label for="reg-name">Full Name</label>
            <input
              type="text"
              id="reg-name"
              placeholder="John Doe"
              autocomplete="name"
            />
            <span class="field-error" id="reg-name-error" role="alert"></span>
          </div>
          <div class="field">
            <label for="reg-email">Email</label>
            <input
              type="email"
              id="reg-email"
              placeholder="john@example.com"
              autocomplete="email"
            />
            <span class="field-error" id="reg-email-error" role="alert"></span>
          </div>
          <div class="field">
            <label for="reg-password">Password</label>
            <div class="input-row">
              <input
                type="password"
                id="reg-password"
                placeholder="Min. 8 characters"
                autocomplete="new-password"
              />
              <button type="button" class="toggle-password" data-target="reg-password">Show</button>
            </div>
            <span class="field-error" id="reg-password-error" role="alert"></span>
          </div>
          <div class="field">
            <label for="reg-confirm">Confirm Password</label>
            <div class="input-row">
              <input
                type="password"
                id="reg-confirm"
                placeholder="Repeat your password"
                autocomplete="new-password"
              />
              <button type="button" class="toggle-password" data-target="reg-confirm">Show</button>
            </div>
            <span class="field-error" id="reg-confirm-error" role="alert"></span>
          </div>
          <button type="submit" id="register-submit" class="btn-submit">Create Account</button>
        </form>
        <p class="form-switch">
          Already have an account? <a href="#" id="go-to-login">Log In</a>
        </p>
      </div>

      <!-- Login View -->
      <div id="login-view" class="form-card" hidden>
        <div class="form-card-header">
          <h2>Welcome Back</h2>
          <p>Log in to your account</p>
        </div>
        <div id="login-alert" class="form-alert" role="alert"></div>
        <form id="login-form" novalidate>
          <div class="field">
            <label for="login-email">Email</label>
            <input
              type="email"
              id="login-email"
              placeholder="john@example.com"
              autocomplete="email"
            />
            <span class="field-error" id="login-email-error" role="alert"></span>
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <div class="input-row">
              <input
                type="password"
                id="login-password"
                placeholder="Your password"
                autocomplete="current-password"
              />
              <button type="button" class="toggle-password" data-target="login-password">Show</button>
            </div>
            <span class="field-error" id="login-password-error" role="alert"></span>
          </div>
          <button type="submit" id="login-submit" class="btn-submit">Log In</button>
        </form>
        <p class="form-switch">
          Don't have an account? <a href="#" id="go-to-register">Sign Up</a>
        </p>
      </div>

      <!-- Dashboard View -->
      <div id="dashboard-view" class="form-card dashboard" hidden>
        <div class="success-icon" aria-hidden="true">&#10003;</div>
        <h2>Welcome, <span id="welcome-name"></span>!</h2>
        <p class="welcome-email">Logged in as <strong id="welcome-email"></strong></p>
        <button id="logout-btn" class="btn-submit btn-outline">Log Out</button>
      </div>
    </main>
