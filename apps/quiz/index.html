<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home page</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.13.1/css/all.css"
      integrity="sha384-xxzQGERXS00kBmZW/6qxqJPyxW3UR0BPsL4c8ILaIWXva5kFi7TxkIIaMiKtqV1Q"
      crossorigin="anonymous"
    />
    <style>
      .announcement-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1001;
        background: linear-gradient(90deg, #4f46e5, #9333ea);
        color: #fff;
        text-align: center;
        padding: 10px 20px;
        font-size: 0.88rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .announcement-bar .bar-text {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .announcement-bar .bar-cta {
        display: inline-block;
        background: #fff;
        color: #1e1b4b;
        font-size: 0.82rem;
        font-weight: 700;
        padding: 5px 14px;
        border-radius: 20px;
        text-decoration: none;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        transition: background 0.15s, transform 0.15s;
      }

      .announcement-bar .bar-cta:hover {
        background: #ede9fe;
        transform: scale(1.04);
      }

      .topnav {
        top: 44px !important;
      }

      main {
        margin-top: calc(var(--nav-width) + 44px) !important;
      }

      @media (max-width: 600px) {
        .announcement-bar {
          font-size: 0.82rem;
          padding: 10px 14px;
          gap: 8px;
        }

        .topnav {
          top: 64px !important;
        }

        main {
          margin-top: calc(var(--nav-width) + 64px) !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="announcement-bar">
      <div class="bar-text">
        ✨ One subscription for every top AI — Claude Fable 5, GPT-5.5, Gemini 3.1 Pro & more.
      </div>
      <a class="bar-cta" href="https://www.izzedo.chat/?ref=marko" target="_blank" rel="noopener noreferrer">Try Izzedo Free →</a>
    </div>
    <div class="container">
      <div id="home" class="flex-column flex-center">
        <h1>Are you Ready?</h1>
        <a href="game.html" class="btn">Play</a>
        <a href="highscores.html" id="highscore-btn" class="btn"
          >High Scores<i class="fas fa-crown"></i
        ></a>
      </div>
    </div>
  </body>
</html>
